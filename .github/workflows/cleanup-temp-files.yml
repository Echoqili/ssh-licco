name: Cleanup Temporary Files

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Remove temporary files
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 删除临时文档
          files=(
            "MARKETPLACE_SUBMISSION_COMPLETE.md"
            "MARKETPLACE_SUBMIT_GUIDE.md"
            "MARKET_SEARCH_STATUS.md"
            "MCP_MARKETPLACE_MANAGEMENT_GUIDE.md"
            "MCP_PUBLISH_GUIDE.md"
            "MCP_REGISTRY_STATUS.md"
            "MCP_SETUP_GUIDE.md"
            "PUBLISH_SUCCESS.md"
            "PUBLISH_SUMMARY.md"
            "CLEANUP_SUMMARY.md"
            "CONFIG_GUIDE.md"
            "CONFIG_MANAGEMENT_GUIDE.md"
            "CONNECTION_TEST_REPORT.md"
            "DOCKER_MCP_TIMEOUT.md"
            "DOCKER_MIRROR_SETUP.md"
            "DOCKER_OPTIMIZATION.md"
            "INSTALL_SUCCESS.md"
            "LAUNCHGUIDE.md"
            "MANAGEMENT_GUIDE_SUMMARY.md"
            "PASSWORD_SECURITY.md"
            "PROJECT_COMPLETE.md"
            "QUICK_REFERENCE_CARD.md"
            "RELEASE_GUIDE.md"
            "RELEASE_SUMMARY.md"
            "SECURITY_GUIDE.md"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              git rm "$file"
              echo "Removed: $file"
            fi
          done
          
          # 提交删除
          git commit -m "chore: remove temporary documentation files" || echo "No changes to commit"
          git push origin master
